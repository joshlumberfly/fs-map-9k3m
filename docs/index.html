<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>Food Safety Map</title>
  <meta name="description" content="Map of food businesses on the Victorian Food Safety Register of Convictions." />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />

  <meta name="theme-color" content="#dc2626" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Food Safety" />

  <meta name="robots" content="noindex,nofollow" />

  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header id="topbar">
    <span class="title">Food Safety Map</span>
    <a class="source-link"
       href="https://www.health.vic.gov.au/food-safety/food-safety-register-of-convictions"
       target="_blank" rel="noopener">Source: Vic register &rarr;</a>
  </header>

  <div id="map" aria-label="Map of food-safety convictions"></div>

  <div id="status" role="status" aria-live="polite" hidden></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
