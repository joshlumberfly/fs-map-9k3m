name: Update convictions data

on:
  schedule:
    # Sundays 19:00 UTC = Mondays 06:00 AEST. GitHub's cron drifts under load,
    # so the actual run time may slip by minutes-to-an-hour — fine for weekly.
    - cron: "0 19 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - run: pip install -r scraper/requirements.txt

      - run: python scraper/scrape.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/convictions.json
          if git diff --cached --quiet; then
            echo "No changes to convictions.json — nothing to commit."
          else
            git commit -m "data: refresh convictions register"
            git push
          fi
